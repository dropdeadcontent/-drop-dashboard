<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard Drop Dead Content</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.logo{font-size:17px;font-weight:600}.logo span{opacity:.45;font-weight:400}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select,button{font-size:13px;padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#1a1a1a}
button:hover{background:#f0f0f0}
.view-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.alerts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.alert-pill{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.a-red{background:#FCEBEB;color:#A32D2D}
.a-amber{background:#FAEEDA;color:#854F0B}
.a-green{background:#EAF3DE;color:#3B6D11}
.updated{font-size:11px;color:#bbb;margin-bottom:16px}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:start}
.col{background:#f1efe8;border-radius:10px;padding:10px}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#888}
.col-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;background:#e0ddd6;color:#666}
.kcard{background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer}
.kcard:last-child{margin-bottom:0}
.kcard:hover{background:#fafaf8}
.kcard-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.kcard-meta{font-size:11px;color:#999;margin-bottom:8px}
.kcard-bottom{display:flex;align-items:center;justify-content:space-between}
.status-dot{width:8px;height:8px;border-radius:50%}
.s-ok{background:#639922}.s-warn{background:#EF9F27}.s-danger{background:#E24B4A}
.kcard-pct{font-size:11px;color:#aaa}
.kcard-bar{height:3px;background:#eee;border-radius:2px;overflow:hidden;margin-top:6px}
.kcard-bar-fill{height:100%;border-radius:2px}
.kcard-posts{display:none;margin-top:10px;border-top:1px solid #f0ede8;padding-top:8px}
.post-item{padding:6px 0;border-bottom:1px solid #f5f2ee}
.post-item:last-child{border-bottom:none}
.post-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:6px}
.post-title{font-size:12px;color:#1a1a1a;font-weight:500;flex:1;line-height:1.3}
.post-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.post-meta{margin-top:2px;font-size:10px;color:#aaa}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:24px}
.card{background:#fff;border:1px solid #e8e6e1;border-radius:12px;padding:14px 16px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cname{font-size:14px;font-weight:600}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-ok{background:#EAF3DE;color:#3B6D11}.b-warn{background:#FAEEDA;color:#854F0B}
.b-danger{background:#FCEBEB;color:#A32D2D}.b-muted{background:#F1EFE8;color:#5F5E5A}
.stages{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stage-item{font-size:11px;color:#666;display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%}
.d-gray{background:#B4B2A9}.d-amber{background:#EF9F27}.d-blue{background:#378ADD}
.d-purple{background:#7F77DD}.d-green{background:#639922}
.bar-wrap{height:4px;background:#eee;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.section-title{font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;margin-top:8px}
.client-card{background:#fff;border:1px solid #e8e6e1;border-radius:12px;margin-bottom:10px;overflow:hidden}
.client-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;gap:8px}
.client-header:hover{background:#faf9f7}
.client-name{font-size:14px;font-weight:600}
.client-meta{font-size:12px;color:#999;margin-top:2px}
.chv{font-size:13px;color:#ccc;transition:transform .2s;display:inline-block}
.chv.open{transform:rotate(180deg)}
.posts-table{display:none;border-top:1px solid #f0ede8}
.posts-table.open{display:block}
.post-row{border-top:1px solid #f5f2ee;padding:8px 16px}
.post-row-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.post-row-name{font-size:13px;color:#1a1a1a;font-weight:500;flex:1}
.post-row-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.post-row-meta{font-size:11px;color:#aaa;margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.nop{padding:16px;text-align:center;font-size:13px;color:#bbb}
.loading,.err{text-align:center;padding:48px 20px;font-size:14px;color:#aaa}
.err{color:#c0392b}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@media(max-width:700px){.kanban{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Drop Dead Content <span>/ producao</span></div>
    <div class="controls">
      <select id="monthSel" onchange="load()">
        <option value="2026-06">Junho 2026</option>
        <option value="2026-07" selected>Julho 2026</option>
        <option value="2026-08">Agosto 2026</option>
      </select>
      <button class="view-btn active" id="btn-kanban" onclick="setView('kanban')">kanban</button>
      <button class="view-btn" id="btn-lista" onclick="setView('lista')">lista</button>
      <button onclick="load()">atualizar</button>
    </div>
  </header>
  <div id="alerts" class="alerts" style="display:none"></div>
  <div class="updated" id="upd" style="display:none"></div>
  <div id="main"><div class="loading"><span class="spin">...</span> carregando...</div></div>
</div>
<script>
var PK=["planej","copy","design","aprov","pub"];
var COL_LABELS=["briefing","copy","design","aprovacao","pronto"];
var currentView="kanban";
var lastPosts=[], lastUpdated="";

var PH_LABEL={planej:"pauta",copy:"copy",design:"design",aprov:"aprov.",pub:"pronto"};
var PH_COLOR={planej:"#888",copy:"#854F0B",design:"#1a5aa3",aprov:"#5035b3",pub:"#3B6D11"};
var PH_BG={planej:"#f1efe8",copy:"#fff3e0",design:"#e8f0fb",aprov:"#ede8fe",pub:"#e8f5e0"};

function phase(s){
  if(!s)return"planej";
  if(s.indexOf("[P]")===0)return"planej";
  if(s.indexOf("[C]")===0)return"copy";
  if(s.indexOf("[D]")===0)return"design";
  if(s.indexOf("[A]")===0)return"aprov";
  if(s.indexOf("Conclu")>=0||s.indexOf("Entregue")>=0)return"pub";
  return"planej";
}
function isDone(s){return!!(s&&(s.indexOf("Conclu")>=0||s.indexOf("Entregue")>=0));}

function clientStatus(posts){
  if(!posts.length)return"muted";
  var done=posts.filter(function(p){return isDone(p.status);}).length;
  var pct=Math.round(done/posts.length*100);
  if(pct===100)return"ok";
  var inPauta=posts.filter(function(p){return phase(p.status)==="planej";}).length;
  if(inPauta>=posts.length/2)return"danger";
  return"warn";
}
function stageCounts(posts){
  var c={planej:0,copy:0,design:0,aprov:0,pub:0};
  posts.forEach(function(p){c[phase(p.status)]++;});
  return c;
}
function clientMainPhase(posts){
  var sc=stageCounts(posts);
  var order=["copy","design","aprov","planej","pub"];
  for(var i=0;i<order.length;i++){if(sc[order[i]]>0)return order[i];}
  return"planej";
}
function fmtDate(d){if(!d)return"";var p=d.split("-");return p[2]+"/"+p[1];}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+"...":s||"-";}

function setView(v){
  currentView=v;
  document.getElementById("btn-kanban").className="view-btn"+(v==="kanban"?" active":"");
  document.getElementById("btn-lista").className="view-btn"+(v==="lista"?" active":"");
  if(lastPosts.length)render(lastPosts,lastUpdated);
}

async function load(){
  var month=document.getElementById("monthSel").value;
  document.getElementById("main").innerHTML='<div class="loading"><span class="spin">...</span> buscando no Notion...</div>';
  document.getElementById("alerts").style.display="none";
  document.getElementById("upd").style.display="none";
  try{
    var res=await fetch("/.netlify/functions/get-posts?month="+month);
    var json=await res.json();
    if(json.error)throw new Error(json.error);
    lastPosts=json.posts||[];
    lastUpdated=json.updatedAt||"";
    render(lastPosts,lastUpdated);
  }catch(e){
    document.getElementById("main").innerHTML='<div class="err">Erro: '+e.message+'</div>';
  }
}

function render(posts,updatedAt){
  if(updatedAt){
    var d=new Date(updatedAt);
    document.getElementById("upd").textContent="atualizado as "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("upd").style.display="";
  }
  var byC={};
  posts.forEach(function(p){
    var c=p.client||"Sem cliente";
    if(!byC[c])byC[c]=[];
    byC[c].push(p);
  });
  var clients=Object.keys(byC).sort();
  if(!clients.length){document.getElementById("main").innerHTML='<div class="nop">Nenhum post encontrado.</div>';return;}

  var nDanger=0,nWarn=0,nOk=0;
  clients.forEach(function(c){
    var st=clientStatus(byC[c]);
    if(st==="danger"||st==="muted")nDanger++;
    else if(st==="warn")nWarn++;
    else nOk++;
  });
  var alertsEl=document.getElementById("alerts");
  alertsEl.innerHTML=
    (nDanger?'<span class="alert-pill a-red">'+nDanger+' cliente'+(nDanger>1?'s':'')+' precisa'+(nDanger>1?'m':'')+' de atencao</span>':'')+
    (nWarn?'<span class="alert-pill a-amber">'+nWarn+' em andamento</span>':'')+
    (nOk?'<span class="alert-pill a-green">'+nOk+' ok</span>':'');
  alertsEl.style.display="flex";

  if(currentView==="kanban") renderKanban(clients,byC);
  else renderLista(clients,byC);
}

function postBadge(ph){
  return'<span class="post-badge" style="background:'+PH_BG[ph]+';color:'+PH_COLOR[ph]+'">'+PH_LABEL[ph]+'</span>';
}

function postMetaHtml(p){
  var parts=[];
  if(p.data)parts.push(fmtDate(p.data));
  if(p.responsavel)parts.push(p.responsavel);
  if(p.formato)parts.push(p.formato);
  return parts.length?'<div class="post-meta">'+parts.join(' · ')+'</div>':'';
}

function renderKanban(clients,byC){
  var cols={planej:[],copy:[],design:[],aprov:[],pub:[]};
  clients.forEach(function(c){cols[clientMainPhase(byC[c])].push(c);});

  var html='<div class="kanban">';
  ["planej","copy","design","aprov","pub"].forEach(function(ph,i){
    var list=cols[ph];
    html+='<div class="col">';
    html+='<div class="col-header"><span class="col-title">'+COL_LABELS[i]+'</span><span class="col-count">'+list.length+'</span></div>';
    list.forEach(function(c){
      var cp=byC[c], st=clientStatus(cp), sc=stageCounts(cp);
      var pct=cp.length?Math.round(sc.pub/cp.length*100):0;
      var dotCls=st==="ok"?"s-ok":st==="warn"?"s-warn":"s-danger";
      var barColor=st==="ok"?"#639922":st==="warn"?"#EF9F27":"#E24B4A";
      var stTxt=st==="ok"?"em dia":st==="warn"?"atencao":"atrasado";
      var cardId="kc-"+c.replace(/[\s\W]/g,"-");

      var stagePills="";
      if(sc.planej)stagePills+='<span style="color:#888;font-size:10px">'+sc.planej+' pauta</span> ';
      if(sc.copy)stagePills+='<span style="color:#854F0B;font-size:10px">'+sc.copy+' copy</span> ';
      if(sc.design)stagePills+='<span style="color:#1a5aa3;font-size:10px">'+sc.design+' design</span> ';
      if(sc.aprov)stagePills+='<span style="color:#5035b3;font-size:10px">'+sc.aprov+' aprov</span> ';
      if(sc.pub)stagePills+='<span style="color:#3B6D11;font-size:10px">'+sc.pub+' ok</span>';

      var postsHtml='<div class="kcard-posts" id="'+cardId+'">';
      cp.forEach(function(p){
        var ph=phase(p.status);
        postsHtml+='<div class="post-item">';
        postsHtml+='<div class="post-title-row"><span class="post-title">'+p.name+'</span>'+postBadge(ph)+'</div>';
        postsHtml+=postMetaHtml(p);
        postsHtml+='</div>';
      });
      postsHtml+='</div>';

      html+='<div class="kcard" onclick="toggleKCard(\''+cardId+'\')">';
      html+='<div class="kcard-name">'+c+'</div>';
      html+='<div class="kcard-meta">'+cp.length+' post'+(cp.length!==1?'s':'')+(stagePills?' · '+stagePills:'')+'</div>';
      html+='<div class="kcard-bottom"><span style="display:flex;align-items:center;gap:5px"><span class="status-dot '+dotCls+'"></span><span style="font-size:11px;color:#999">'+stTxt+'</span></span><span class="kcard-pct">'+pct+'%</span></div>';
      html+='<div class="kcard-bar"><div class="kcard-bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>';
      html+=postsHtml+'</div>';
    });
    if(!list.length)html+='<div style="font-size:12px;color:#ccc;text-align:center;padding:12px 0">-</div>';
    html+='</div>';
  });
  html+='</div>';
  document.getElementById("main").innerHTML=html;
}

function renderLista(clients,byC){
  var overviewHtml='<div class="grid">';
  clients.forEach(function(c){
    var cp=byC[c], st=clientStatus(cp), sc=stageCounts(cp);
    var pct=cp.length?Math.round(sc.pub/cp.length*100):0;
    var bCls=st==="ok"?"b-ok":st==="warn"?"b-warn":st==="danger"?"b-danger":"b-muted";
    var bTxt=st==="ok"?"ok":st==="warn"?"em andamento":st==="danger"?"atencao":"sem posts";
    var barColor=st==="ok"?"#639922":st==="warn"?"#EF9F27":"#E24B4A";
    var stagesHtml="";
    if(sc.planej)stagesHtml+='<span class="stage-item"><span class="dot d-gray"></span>'+sc.planej+' pauta</span>';
    if(sc.copy)stagesHtml+='<span class="stage-item"><span class="dot d-amber"></span>'+sc.copy+' copy</span>';
    if(sc.design)stagesHtml+='<span class="stage-item"><span class="dot d-blue"></span>'+sc.design+' design</span>';
    if(sc.aprov)stagesHtml+='<span class="stage-item"><span class="dot d-purple"></span>'+sc.aprov+' aprov</span>';
    if(sc.pub)stagesHtml+='<span class="stage-item"><span class="dot d-green"></span>'+sc.pub+' ok</span>';
    if(!stagesHtml)stagesHtml='<span class="stage-item" style="color:#ccc">sem posts</span>';
    overviewHtml+='<div class="card"><div class="card-top"><span class="cname">'+c+'</span><span class="badge '+bCls+'">'+bTxt+'</span></div><div class="stages">'+stagesHtml+'</div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div></div>';
  });
  overviewHtml+='</div>';

  var detailHtml='<div class="section-title">detalhe por post</div>';
  clients.forEach(function(c){
    var cp=byC[c];
    var rows=cp.length?cp.map(function(p){
      var ph=phase(p.status);
      return'<div class="post-row">'+
        '<div class="post-row-top"><span class="post-row-name">'+p.name+'</span><span class="post-row-badge" style="background:'+PH_BG[ph]+';color:'+PH_COLOR[ph]+'">'+PH_LABEL[ph]+'</span></div>'+
        postMetaHtml(p)+
        '</div>';
    }).join(''):'<div class="nop">sem posts mapeados</div>';

    detailHtml+='<div class="client-card"><div class="client-header" onclick="tog(this)"><div><div class="client-name">'+c+'</div><div class="client-meta">'+cp.length+' post'+(cp.length!==1?'s':'')+'</div></div><span class="chv open">v</span></div><div class="posts-table open">'+rows+'</div></div>';
  });
  document.getElementById("main").innerHTML=overviewHtml+detailHtml;
}

function tog(h){var t=h.nextElementSibling,c=h.querySelector(".chv");t.classList.toggle("open");c.classList.toggle("open");}
function toggleKCard(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==="block"?"none":"block";}
load();
</script>
</body>
</html>
