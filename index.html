<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard Drop Dead Content</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 20px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{font-size:17px;font-weight:600}.logo span{opacity:.45;font-weight:400}
.controls{display:flex;gap:8px;align-items:center}
select,button{font-size:13px;padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#1a1a1a}
button:hover{background:#f0f0f0}
.alerts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.alert-pill{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px}
.a-red{background:#FCEBEB;color:#A32D2D}
.a-amber{background:#FAEEDA;color:#854F0B}
.a-green{background:#EAF3DE;color:#3B6D11}
.a-gray{background:#F1EFE8;color:#5F5E5A}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:32px}
.card{background:#fff;border:1px solid #e8e6e1;border-radius:12px;padding:14px 16px;cursor:pointer}
.card:hover{background:#faf9f7}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cname{font-size:14px;font-weight:600;color:#1a1a1a}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-ok{background:#EAF3DE;color:#3B6D11}
.b-warn{background:#FAEEDA;color:#854F0B}
.b-danger{background:#FCEBEB;color:#A32D2D}
.b-muted{background:#F1EFE8;color:#5F5E5A}
.stages{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.stage-item{font-size:11px;color:#666;display:flex;align-items:center;gap:4px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-gray{background:#B4B2A9}
.d-amber{background:#EF9F27}
.d-blue{background:#378ADD}
.d-purple{background:#7F77DD}
.d-green{background:#639922}
.d-red{background:#E24B4A}
.bar-wrap{height:4px;background:#eee;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .4s}
.section-title{font-size:13px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.posts-section{margin-top:8px}
.client-card{background:#fff;border:1px solid #e8e6e1;border-radius:12px;margin-bottom:10px;overflow:hidden}
.client-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;gap:8px}
.client-header:hover{background:#faf9f7}
.client-name{font-size:14px;font-weight:600}
.client-meta{font-size:12px;color:#999;margin-top:2px}
.chv{font-size:13px;color:#ccc;transition:transform .2s;display:inline-block}
.chv.open{transform:rotate(180deg)}
.posts-table{display:none;border-top:1px solid #f0ede8}
.posts-table.open{display:block}
.tbl-head,.tbl-row{display:grid;grid-template-columns:1fr 72px 72px 72px 72px 72px 58px;align-items:center}
.tbl-head{background:#faf9f7}
.tbl-head>div{font-size:10px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:center}
.tbl-head>div:first-child{text-align:left}
.tbl-row{border-top:1px solid #f5f2ee;min-height:38px}
.tbl-row>div{padding:6px 10px;font-size:12px}
.dw{display:flex;align-items:center;justify-content:center}
.dot2{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.d-done{background:#e8f5e0;color:#3d8b1a}
.d-act{background:#fff3e0;color:#b35c00}
.d-no{background:#f5f5f5;color:#ccc;border:1px solid #eee}
.pill{display:inline-flex;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
.p-planej{background:#f1efe8;color:#6b6b63}
.p-copy{background:#fff3e0;color:#b35c00}
.p-design{background:#e8f0fb;color:#1a5aa3}
.p-aprov{background:#ede8fe;color:#5035b3}
.p-pub{background:#e8f5e0;color:#3d8b1a}
.dc{font-size:11px;color:#aaa;text-align:center}
.nop{padding:16px;text-align:center;font-size:13px;color:#bbb}
.loading,.err{text-align:center;padding:48px 20px;font-size:14px;color:#aaa}
.err{color:#c0392b}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.updated{font-size:11px;color:#bbb;margin-bottom:20px}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Drop Dead Content <span>/ producao</span></div>
    <div class="controls">
      <select id="monthSel" onchange="load()">
        <option value="2026-06" selected>Junho 2026</option>
        <option value="2026-07">Julho 2026</option>
        <option value="2026-08">Agosto 2026</option>
      </select>
      <button onclick="load()">atualizar</button>
    </div>
  </header>

  <div id="alerts" class="alerts" style="display:none"></div>
  <div class="updated" id="upd" style="display:none"></div>
  <div id="main"><div class="loading"><span class="spin">...</span> carregando...</div></div>
</div>

<script>
var PK=["planej","copy","design","aprov","pub"];
var PL=["Planej.","Copy","Design","Aprov.","Pub."];

function phase(s){
  if(!s)return"planej";
  if(s.indexOf("[P]")===0)return"planej";
  if(s.indexOf("[C]")===0)return"copy";
  if(s.indexOf("[D]")===0)return"design";
  if(s.indexOf("[A]")===0)return"aprov";
  if(s.indexOf("Concluido")>=0||s.indexOf("Conclu")>=0||s.indexOf("Entregue")>=0)return"pub";
  return"planej";
}
function isDone(s){return!!(s&&(s.indexOf("Conclu")>=0||s.indexOf("Entregue")>=0));}

function clientStatus(posts){
  if(!posts.length)return"muted";
  var done=posts.filter(function(p){return isDone(p.status);}).length;
  var pct=Math.round(done/posts.length*100);
  if(pct===100)return"ok";
  var inPauta=posts.filter(function(p){return phase(p.status)==="planej";}).length;
  if(inPauta>posts.length/2)return"danger";
  return"warn";
}

function stageCounts(posts){
  var c={planej:0,copy:0,design:0,aprov:0,pub:0};
  posts.forEach(function(p){c[phase(p.status)]++;});
  return c;
}

function dot(pp,cp){
  var pi=PK.indexOf(pp),ci=PK.indexOf(cp);
  if(isDone(pp)||pi>ci)return'<div class="dot2 d-done">ok</div>';
  if(pi===ci)return'<div class="dot2 d-act">.</div>';
  return'<div class="dot2 d-no"></div>';
}
function pill(ph){
  var l={planej:"pauta",copy:"copy",design:"design",aprov:"aprov.",pub:"pub."};
  return'<span class="pill p-'+ph+'">'+l[ph]+'</span>';
}
function fmtDate(d){if(!d)return"-";var p=d.split("-");return p[2]+"/"+p[1];}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+"...":s||"-";}

async function load(){
  var month=document.getElementById("monthSel").value;
  document.getElementById("main").innerHTML='<div class="loading"><span class="spin">...</span> buscando no Notion...</div>';
  document.getElementById("alerts").style.display="none";
  document.getElementById("upd").style.display="none";
  try{
    var res=await fetch("/.netlify/functions/get-posts?month="+month);
    var json=await res.json();
    if(json.error)throw new Error(json.error);
    render(json.posts,json.updatedAt);
  }catch(e){
    document.getElementById("main").innerHTML='<div class="err">Erro: '+e.message+'</div>';
  }
}

function render(posts,updatedAt){
  if(updatedAt){
    var d=new Date(updatedAt);
    document.getElementById("upd").textContent="atualizado as "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("upd").style.display="";
  }

  var byC={};
  posts.forEach(function(p){
    var c=p.client||"Sem cliente";
    if(!byC[c])byC[c]=[];
    byC[c].push(p);
  });
  var clients=Object.keys(byC).sort();

  if(!clients.length){
    document.getElementById("main").innerHTML='<div class="nop">Nenhum post encontrado.</div>';
    return;
  }

  var nDanger=0,nWarn=0,nOk=0;
  clients.forEach(function(c){
    var st=clientStatus(byC[c]);
    if(st==="danger"||st==="muted")nDanger++;
    else if(st==="warn")nWarn++;
    else nOk++;
  });

  var alertsEl=document.getElementById("alerts");
  alertsEl.innerHTML=
    (nDanger?'<span class="alert-pill a-red">'+nDanger+' cliente'+(nDanger>1?'s':'')+' precisa'+(nDanger>1?'m':'')+' de atencao</span>':'')+
    (nWarn?'<span class="alert-pill a-amber">'+nWarn+' em andamento</span>':'')+
    (nOk?'<span class="alert-pill a-green">'+nOk+' ok</span>':'');
  alertsEl.style.display="flex";

  var overviewHtml='<div class="grid">';
  clients.forEach(function(c){
    var cp=byC[c];
    var st=clientStatus(cp);
    var sc=stageCounts(cp);
    var done=sc.pub;
    var pct=cp.length?Math.round(done/cp.length*100):0;
    var badgeClass=st==="ok"?"b-ok":st==="warn"?"b-warn":st==="danger"?"b-danger":"b-muted";
    var badgeTxt=st==="ok"?"ok":st==="warn"?"em andamento":st==="danger"?"atencao":"sem posts";
    var barColor=st==="ok"?"#639922":st==="warn"?"#EF9F27":"#E24B4A";

    var stagesHtml="";
    if(sc.planej)stagesHtml+='<span class="stage-item"><span class="dot d-gray"></span>'+sc.planej+' pauta</span>';
    if(sc.copy)stagesHtml+='<span class="stage-item"><span class="dot d-amber"></span>'+sc.copy+' copy</span>';
    if(sc.design)stagesHtml+='<span class="stage-item"><span class="dot d-blue"></span>'+sc.design+' design</span>';
    if(sc.aprov)stagesHtml+='<span class="stage-item"><span class="dot d-purple"></span>'+sc.aprov+' aprovacao</span>';
    if(sc.pub)stagesHtml+='<span class="stage-item"><span class="dot d-green"></span>'+sc.pub+' pronto'+(sc.pub>1?'s':'')+'</span>';
    if(!stagesHtml)stagesHtml='<span class="stage-item" style="color:#bbb">sem posts mapeados</span>';

    overviewHtml+='<div class="card" onclick="scrollToClient(\''+c+'\')">';
    overviewHtml+='<div class="card-top"><span class="cname">'+c+'</span><span class="badge '+badgeClass+'">'+badgeTxt+'</span></div>';
    overviewHtml+='<div class="stages">'+stagesHtml+'</div>';
    overviewHtml+='<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>';
    overviewHtml+='</div>';
  });
  overviewHtml+='</div>';

  var detailHtml='<div class="section-title">detalhe por post</div>';
  clients.forEach(function(c){
    var cp=byC[c];
    var rows=cp.length?
      '<div class="tbl-head"><div>post</div>'+PL.map(function(l){return'<div>'+l+'</div>';}).join('')+'<div>data</div></div>'+
      cp.map(function(p){
        var ph=phase(p.status);
        return'<div class="tbl-row"><div><div style="display:flex;align-items:center;gap:5px">'+pill(ph)+'<span style="font-size:12px">'+trunc(p.name,38)+'</span></div>'+(p.formato?'<div style="font-size:10px;color:#bbb;margin-top:1px">'+p.formato+'</div>':'')+'</div>'+PK.map(function(pk){return'<div class="dw">'+dot(ph,pk)+'</div>';}).join('')+'<div class="dc">'+fmtDate(p.data)+'</div></div>';
      }).join('')
      :'<div class="nop">sem posts mapeados</div>';

    detailHtml+='<div class="client-card" id="client-'+c.replace(/\s/g,"-")+'">';
    detailHtml+='<div class="client-header" onclick="tog(this)">';
    detailHtml+='<div><div class="client-name">'+c+'</div><div class="client-meta">'+cp.length+' post'+(cp.length!==1?'s':'')+'</div></div>';
    detailHtml+='<span class="chv open">v</span></div>';
    detailHtml+='<div class="posts-table open">'+rows+'</div></div>';
  });

  document.getElementById("main").innerHTML=overviewHtml+detailHtml;
}

function tog(h){var t=h.nextElementSibling,c=h.querySelector(".chv");t.classList.toggle("open");c.classList.toggle("open");}

function scrollToClient(name){
  var el=document.getElementById("client-"+name.replace(/\s/g,"-"));
  if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
}

load();
</script>
</body>
</html>
